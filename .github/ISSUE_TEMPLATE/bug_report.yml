name: Bug Report
description: Report a bug to help us improve HighBoy Firmware.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        ### Thank you for reporting a bug! 
        Please provide as much information as possible to help us reproduce and fix it.
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: "e.g., The CC1101 fails to initialize on ESP32-C5..."
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this behavior?
      placeholder: |
        1. Build for ESP32-C5
        2. Flash to hardware
        3. Open Serial Monitor...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
  - type: input
    id: hardware
    attributes:
      label: Hardware Target
      description: Which ESP32 chip are you using? (S3, P4, C5)
      placeholder: "e.g., ESP32-C5"
  - type: textarea
    id: logs
    attributes:
      label: Serial Logs / Screenshots
      description: Please paste any relevant logs from the serial monitor or upload screenshots.
      render: shell
