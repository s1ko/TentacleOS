name: Feature Request
description: Suggest a new feature or improvement for HighBoy.
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Is your feature request related to a problem? Please describe.
      placeholder: "e.g., I'm always frustrated when..."
  - type: textarea
    id: feature
    attributes:
      label: Proposed Solution
      description: A clear and concise description of what you want to happen.
      placeholder: "e.g., I would love to see support for..."
    validations:
      required: true
  - type: textarea
    id: use-case
    attributes:
      label: Use Case
      description: Why is this feature needed? How would it benefit the project?
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative solutions or features you've considered.
